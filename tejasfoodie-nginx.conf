server {
    listen 80;
    listen [::]:80;
    server_name tejasfoodie.store www.tejasfoodie.store;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tejasfoodie.store www.tejasfoodie.store;

    # SSL Certificate paths (will be auto-generated by Certbot)
    ssl_certificate /etc/letsencrypt/live/tejasfoodie.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tejasfoodie.store/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/tejasfoodie.store/chain.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Root directory (same as your Laravel project)
    root /var/www/govt-job-portal-new/public;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/tejasfoodie-access.log;
    error_log /var/log/nginx/tejasfoodie-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
