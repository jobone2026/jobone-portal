<style>
.puc-blog *{box-sizing:border-box;margin:0;padding:0}
.puc-blog{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1A1A1A;line-height:1.6}
.puc-blog a{color:#1565C0;text-decoration:none}
.puc-blog .pb-hero{background:linear-gradient(135deg,#0D2137 0%,#1B3A5C 60%,#1565C0 100%);color:#fff;padding:32px 16px 28px;text-align:center;border-radius:10px;margin-bottom:16px;overflow:hidden}
.puc-blog .pb-hero-badge{display:inline-block;background:#C9A84C;color:#1A1A1A;font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;margin-bottom:12px;letter-spacing:0.06em;text-transform:uppercase}
.puc-blog .pb-h1{font-size:clamp(17px,4vw,28px);font-weight:700;line-height:1.3;margin-bottom:8px;color:#fff;font-family:Georgia,serif}
.puc-blog .pb-h1 span{color:#C9A84C}
.puc-blog .pb-hero-meta{font-size:11px;color:rgba(255,255,255,0.75);margin-bottom:18px;line-height:1.5}
.puc-blog .pb-hero-meta strong{color:#fff}
.puc-blog .pb-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:460px;margin:0 auto}
.puc-blog .pb-stat-box{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 6px;text-align:center}
.puc-blog .pb-stat-num{font-size:16px;font-weight:700;color:#C9A84C;display:block}
.puc-blog .pb-stat-label{font-size:10px;color:rgba(255,255,255,0.7);margin-top:2px;display:block;line-height:1.3}
.puc-blog .pb-section{padding:22px 0 0}
.puc-blog .pb-h2{font-size:16px;font-weight:700;margin-bottom:3px;color:#1A1A1A;font-family:Georgia,serif}
.puc-blog .pb-sub{font-size:12px;color:#666;margin-bottom:14px;line-height:1.5}
.puc-blog .pb-divider{border:none;border-top:1px solid #E5E5E5;margin:22px 0}
.puc-blog .pb-banner{background:#E8F5EE;border:1px solid #A8D5BE;border-radius:8px;padding:12px 14px;margin:16px 0;display:flex;align-items:flex-start;gap:10px}
.puc-blog .pb-banner-icon{font-size:18px;flex-shrink:0;line-height:1.5}
.puc-blog .pb-banner p{font-size:12px;color:#145235;line-height:1.6;margin:0}
.puc-blog .pb-banner strong{display:block;font-size:13px;color:#0D3D25;margin-bottom:2px}
.puc-blog .pb-stream-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.puc-blog .pb-stream-card{border-radius:8px;padding:12px 8px;text-align:center;border:1px solid transparent}
.puc-blog .pb-stream-card.sc{background:#E8F0FE;border-color:#BBDEFB}
.puc-blog .pb-stream-card.co{background:#FFF8E1;border-color:#FFE082}
.puc-blog .pb-stream-card.ar{background:#F3E5F5;border-color:#CE93D8}
.puc-blog .pb-stream-icon{font-size:18px;margin-bottom:4px;display:block}
.puc-blog .pb-stream-name{font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:3px;display:block}
.puc-blog .pb-stream-card.sc .pb-stream-name{color:#1565C0}
.puc-blog .pb-stream-card.co .pb-stream-name{color:#795548}
.puc-blog .pb-stream-card.ar .pb-stream-name{color:#6A1B9A}
.puc-blog .pb-stream-pct{font-size:20px;font-weight:700;display:block}
.puc-blog .pb-stream-card.sc .pb-stream-pct{color:#1565C0}
.puc-blog .pb-stream-card.co .pb-stream-pct{color:#5D4037}
.puc-blog .pb-stream-card.ar .pb-stream-pct{color:#6A1B9A}
.puc-blog .pb-stream-appeared{font-size:10px;color:#666;margin-top:2px;display:block}
.puc-blog .pb-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.puc-blog .pb-info-box{background:#FAFAFA;border:1px solid #E5E5E5;border-radius:8px;padding:10px 12px}
.puc-blog .pb-info-label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:3px;display:block}
.puc-blog .pb-info-val{font-size:13px;font-weight:600;color:#1A1A1A;display:block}
.puc-blog .pb-topper-section{margin-bottom:20px}
.puc-blog .pb-stream-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;border-radius:8px 8px 0 0;border:1px solid transparent;flex-wrap:wrap}
.puc-blog .pb-stream-hdr.sc{background:#E8F0FE;border-color:#BBDEFB}
.puc-blog .pb-stream-hdr.co{background:#FFF8E1;border-color:#FFE082}
.puc-blog .pb-stream-hdr.ar{background:#F3E5F5;border-color:#CE93D8}
.puc-blog .pb-stream-hdr .pb-stitle{font-size:13px;font-weight:600}
.puc-blog .pb-stream-hdr.sc .pb-stitle{color:#1565C0}
.puc-blog .pb-stream-hdr.co .pb-stitle{color:#5D4037}
.puc-blog .pb-stream-hdr.ar .pb-stitle{color:#6A1B9A}
.puc-blog .pb-stream-hdr .pb-stotal{font-size:11px;color:#666}
.puc-blog .pb-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #E5E5E5;border-top:none;border-radius:0 0 8px 8px}
.puc-blog table.pb-toppers{width:100%;border-collapse:collapse;min-width:300px}
.puc-blog table.pb-toppers thead{background:#FAFAFA}
.puc-blog table.pb-toppers th{padding:8px 10px;font-size:10px;font-weight:700;color:#666;text-align:left;text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid #E5E5E5;white-space:nowrap}
.puc-blog table.pb-toppers td{padding:9px 10px;font-size:12px;border-bottom:1px solid #E5E5E5;color:#1A1A1A}
.puc-blog table.pb-toppers tr:last-child td{border-bottom:none}
.puc-blog .pb-rank{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;flex-shrink:0}
.puc-blog .pb-rank.r1{background:#C9A84C;color:#5D3A00}
.puc-blog .pb-rank.r2{background:#E0E0E0;color:#424242}
.puc-blog .pb-rank.r3{background:#FFCCBC;color:#7F4A30}
.puc-blog .pb-marks{display:inline-block;background:#E8F5EE;color:#1B8A5A;font-weight:700;font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap}
.puc-blog .pb-marks.perfect{background:#FFF3CD;color:#856404}
.puc-blog .pb-dist-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.puc-blog .pb-dist-card{border:1px solid #E5E5E5;border-radius:8px;overflow:hidden}
.puc-blog .pb-dist-head{padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
.puc-blog .pb-dist-head.top{background:#E8F5EE;color:#1B5E20}
.puc-blog .pb-dist-head.low{background:#FDEEEC;color:#C0392B}
.puc-blog .pb-dist-row{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-top:1px solid #E5E5E5;font-size:12px;gap:6px}
.puc-blog .pb-dist-name{color:#1A1A1A;flex:1;font-size:12px}
.puc-blog .pb-dist-right{text-align:right;flex-shrink:0}
.puc-blog .pb-dist-pct{font-weight:700;font-size:12px;display:block}
.puc-blog .pb-dist-pct.hi{color:#1B8A5A}
.puc-blog .pb-dist-pct.lo{color:#C0392B}
.puc-blog .pb-bar{height:3px;border-radius:2px;margin-top:2px}
.puc-blog .pb-bar.hi{background:#1B8A5A}
.puc-blog .pb-bar.lo{background:#C0392B}
.puc-blog .pb-steps{list-style:none;padding:0;counter-reset:pbsteps}
.puc-blog .pb-steps li{counter-increment:pbsteps;display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #E5E5E5;font-size:13px;color:#1A1A1A;line-height:1.5}
.puc-blog .pb-steps li:last-child{border-bottom:none}
.puc-blog .pb-steps li::before{content:counter(pbsteps);min-width:22px;height:22px;border-radius:50%;background:#E8F0FE;color:#1565C0;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.puc-blog .pb-next-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.puc-blog .pb-next-card{border:1px solid #E5E5E5;border-radius:8px;padding:12px}
.puc-blog .pb-next-title{font-weight:600;margin-bottom:4px;font-size:13px;color:#1A1A1A;display:block}
.puc-blog .pb-next-card p{color:#666;line-height:1.5;margin:0;font-size:12px}
.puc-blog .pb-share{background:#FAFAFA;border:1px solid #E5E5E5;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:16px 0}
.puc-blog .pb-share-label{font-size:12px;font-weight:600;color:#1A1A1A}
.puc-blog .pb-share-btn{display:inline-block;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;text-decoration:none}
.puc-blog .pb-share-btn.wa{background:#E8F5EE;color:#1B5E20}
.puc-blog .pb-share-btn.tg{background:#E8F0FE;color:#1565C0}
.puc-blog .pb-share-btn.fb{background:#F3E5F5;color:#6A1B9A}
.puc-blog .pb-disclaimer{background:#FAFAFA;border:1px solid #E5E5E5;border-radius:8px;padding:12px 14px;font-size:11px;color:#666;line-height:1.6;margin:16px 0}
.puc-blog .pb-footer-note{text-align:center;font-size:11px;color:#666;padding:16px 0 24px;border-top:1px solid #E5E5E5}
@media(max-width:480px){
.puc-blog .pb-hero{padding:24px 12px 22px;border-radius:8px}
.puc-blog .pb-h1{font-size:16px}
.puc-blog .pb-hero-meta{font-size:10px}
.puc-blog .pb-stat-num{font-size:14px}
.puc-blog .pb-stat-label{font-size:9px}
.puc-blog .pb-stat-box{padding:8px 4px}
.puc-blog .pb-stream-grid{grid-template-columns:repeat(3,1fr);gap:6px}
.puc-blog .pb-stream-card{padding:10px 4px}
.puc-blog .pb-stream-icon{font-size:14px}
.puc-blog .pb-stream-name{font-size:9px;letter-spacing:0}
.puc-blog .pb-stream-pct{font-size:16px}
.puc-blog .pb-stream-appeared{font-size:9px}
.puc-blog .pb-info-grid{grid-template-columns:1fr 1fr}
.puc-blog .pb-info-val{font-size:12px}
.puc-blog .pb-table-wrap{overflow-x:auto}
.puc-blog table.pb-toppers{min-width:280px}
.puc-blog table.pb-toppers th{font-size:9px;padding:7px 8px}
.puc-blog table.pb-toppers td{font-size:11px;padding:8px 8px}
.puc-blog .pb-rank{width:20px;height:20px;font-size:10px}
.puc-blog .pb-marks{font-size:10px;padding:2px 6px}
.puc-blog .pb-stream-hdr .pb-stitle{font-size:12px}
.puc-blog .pb-stream-hdr .pb-stotal{font-size:10px}
.puc-blog .pb-dist-grid{grid-template-columns:1fr}
.puc-blog .pb-dist-name{font-size:11px}
.puc-blog .pb-dist-pct{font-size:11px}
.puc-blog .pb-steps li{font-size:12px;padding:8px 0}
.puc-blog .pb-steps li::before{min-width:20px;height:20px;font-size:10px}
.puc-blog .pb-next-grid{grid-template-columns:1fr}
.puc-blog .pb-next-title{font-size:12px}
.puc-blog .pb-next-card p{font-size:11px}
.puc-blog .pb-share{gap:6px}
.puc-blog .pb-share-btn{padding:5px 12px;font-size:11px}
.puc-blog .pb-h2{font-size:15px}
.puc-blog .pb-sub{font-size:11px}
.puc-blog .pb-banner p{font-size:11px}
.puc-blog .pb-banner strong{font-size:12px}
}
