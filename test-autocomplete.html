<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Autocomplete</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-4">Test Autocomplete</h1>
    
    <div x-data="{
        query: '',
        results: [],
        showResults: false,
        loading: false,
        error: null,
        async search() {
            console.log('Search called with query:', this.query);
            if (this.query.length < 2) {
                this.results = [];
                this.showResults = false;
                return;
            }
            this.loading = true;
            this.error = null;
            try {
                const response = await fetch(`/search/autocomplete?q=${encodeURIComponent(this.query)}`);
                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);
                this.results = data;
                this.showResults = this.results.length > 0;
            } catch (e) {
                console.error('Error:', e);
                this.error = e.message;
            }
            this.loading = false;
        },
        selectResult(post) {
            window.location.href = `/${post.type}/${post.slug}`;
        }
    }" class="relative max-w-xl">
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Search Query:</label>
            <input 
                type="text" 
                x-model="query"
                @input.debounce.300ms="search()"
                @click.away="showResults = false"
                placeholder="Type to search..." 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                autocomplete="off">
        </div>
        
        <div x-show="loading" class="text-blue-600 mb-2">Loading...</div>
        <div x-show="error" class="text-red-600 mb-2" x-text="'Error: ' + error"></div>
        
        <!-- Autocomplete Results -->
        <div x-show="showResults" 
             class="border-2 border-blue-300 rounded-lg shadow-xl bg-white">
            <div class="p-2 bg-gray-100 font-bold">
                Results (<span x-text="results.length"></span>):
            </div>
            <template x-for="post in results" :key="post.id">
                <div @click="selectResult(post)" 
                     class="px-4 py-3 hover:bg-blue-50 cursor-pointer border-b border-gray-100 last:border-b-0">
                    <p class="text-sm text-gray-900 font-semibold" x-text="post.title"></p>
                    <p class="text-xs text-blue-600 mt-1" x-text="post.type"></p>
                </div>
            </template>
        </div>
        
        <div class="mt-4 p-4 bg-gray-100 rounded">
            <h3 class="font-bold mb-2">Debug Info:</h3>
            <p>Query: <span x-text="query"></span></p>
            <p>Results count: <span x-text="results.length"></span></p>
            <p>Show results: <span x-text="showResults"></span></p>
        </div>
    </div>
</body>
</html>
