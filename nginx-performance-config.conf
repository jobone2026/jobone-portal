# Nginx Performance & Security Configuration for JobOne.in
# Add these directives to your existing server block in /etc/nginx/sites-available/jobone.in

# ═══════════════════════════════════════════════════════════════
# CACHE HEADERS (Saves 181 KiB on repeat visits)
# ═══════════════════════════════════════════════════════════════

# Cache static assets for 1 year
location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Cache HTML for 1 hour
location ~* \.(html)$ {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
}

# ═══════════════════════════════════════════════════════════════
# SECURITY HEADERS (Improves Best Practices score)
# ═══════════════════════════════════════════════════════════════

# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Enable XSS protection
add_header X-XSS-Protection "1; mode=block" always;

# Control referrer information
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Force HTTPS (only add if you have SSL certificate)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Content Security Policy (adjust as needed)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://translate.googleapis.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://translate.googleapis.com;" always;

# ═══════════════════════════════════════════════════════════════
# GZIP COMPRESSION (Reduces transfer size)
# ═══════════════════════════════════════════════════════════════

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
gzip_disable "msie6";

# ═══════════════════════════════════════════════════════════════
# BROTLI COMPRESSION (Better than gzip, if available)
# ═══════════════════════════════════════════════════════════════

# Uncomment if you have brotli module installed
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

# ═══════════════════════════════════════════════════════════════
# INSTALLATION INSTRUCTIONS
# ═══════════════════════════════════════════════════════════════

# 1. SSH to your server
# 2. Edit your Nginx config:
#    sudo nano /etc/nginx/sites-available/jobone.in
#
# 3. Add the directives above inside your server { } block
#
# 4. Test configuration:
#    sudo nginx -t
#
# 5. If test passes, reload Nginx:
#    sudo service nginx reload
#
# 6. Verify headers are working:
#    curl -I https://jobone.in/images/jobone-logo.png
#    (Should see Cache-Control and other headers)

# ═══════════════════════════════════════════════════════════════
