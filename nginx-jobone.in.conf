# ── HTTP → HTTPS redirect (both www and non-www) ─────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name jobone.in www.jobone.in;

    limit_req zone=public burst=20 nodelay;
    limit_conn addr 15;

    return 301 https://jobone.in$request_uri;
}

# ── www → non-www redirect (HTTPS) ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.jobone.in;

    ssl_certificate /etc/letsencrypt/live/jobone.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobone.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    return 301 https://jobone.in$request_uri;
}

# ── Main HTTPS server (jobone.in only) ───────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jobone.in;

    # Rate Limiting
    limit_req zone=public burst=20 nodelay;
    limit_conn addr 15;

    ssl_certificate /etc/letsencrypt/live/jobone.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobone.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/jobone/public;
    index index.php index.html;

    access_log /var/log/nginx/jobone-access.log;
    error_log /var/log/nginx/jobone-error.log;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # ══════════════════════════════════════════════════════════════════════
    # SECURITY RULES - Block WordPress & Common Attacks
    # ══════════════════════════════════════════════════════════════════════

    # Block WordPress - Return 444 (close connection without response)
    location ~* ^/(wp-admin|wp-login\.php|wp-content|wp-includes|wp-config|xmlrpc\.php) {
        return 444;
    }

    # Block Common Exploits
    location ~* (phpmyadmin|pma|mysql|setup\.php|install\.php) {
        return 444;
    }

    # Block Swagger/API Docs Scanners
    location ~* (swagger|api-docs|openapi\.json) {
        return 444;
    }

    # Block Config Files
    location ~* \.(env|git|htaccess|ini|log|sql|bak|backup)$ {
        deny all;
    }

    # ══════════════════════════════════════════════════════════════════════
    # END SECURITY RULES
    # ══════════════════════════════════════════════════════════════════════

    # ── FIX: /admit_card/ → /job/ redirect (Google indexed old URLs) ─────
    location ~ ^/admit_card/(.+)$ {
        return 301 https://jobone.in/job/$1;
    }

    # ── FIX: /blog/ → /job/ redirect (old indexed blog URLs) ────────────
    location ~ ^/blog/(.+)$ {
        return 301 https://jobone.in/job/$1;
    }

    # Cache build assets for 1 year (most specific first)
    location ^~ /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Cache images for 1 year
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Cache fonts for 1 year
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Cache CSS and JS for 1 year
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # JOBSCRAP - Open access (no IP restriction)
    location ^~ /jobscrap/ {
        try_files $uri $uri/ /jobscrap/index.php?$query_string;

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # Main location block
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
